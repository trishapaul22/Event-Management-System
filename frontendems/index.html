<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Management Dashboard</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #ff9966, #ff5e62);
            margin: 0;
            padding: 0;
            text-align: center;
            color: white;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.2);
            box-shadow: 0px 5px 10px rgba(0, 0, 0, 0.2);
        }
        .navbar h1 {
            margin: 0;
            font-size: 24px;
        }
        .login-btn {
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
            font-size: 16px;
            font-weight: 600;
        }
        .login-btn:hover {
            background: rgba(0, 0, 0, 0.9);
            transform: scale(1.05);
        }
        .container {
            max-width: 900px;
            margin: 50px auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }
        .departments {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 30px;
        }
        .department {
            width: 80%;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 18px;
            font-weight: 600;
            text-transform: uppercase;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
            margin: 10px 0;
            text-align: center;
        }
        .department:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>Event Management Dashboard</h1>
        <a href="admin-login.html" class="login-btn">Admin</a>
    </div>
    
    <div class="container">
        <div class="departments">
            <div class="department" onclick="openDepartment('design')">Design</div>
            <div class="department" onclick="openDepartment('soc')">SOC</div>
            <div class="department" onclick="openDepartment('architect')">Architect</div>
        </div>
    </div>

    <script>
        function openDepartment(department) {
            window.location.href = "department-events.html?department=" + department;
        }
    </script>
</body>
</html>
